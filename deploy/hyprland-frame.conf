# Digital Frame — Hyprland snippet.
# Append to ~/.config/hypr/hyprland.conf (or `source = .../deploy/hyprland-frame.conf`).

# Kiosk window: force true fullscreen and keep the screen awake while it shows.
# FRAME_CLASS in frame.env must match this class (default: digital-frame).
# Syntax is Hyprland 0.55+ hyprlang: `match:<prop> <value>` matchers (space, not
# colon), boolean effects take an explicit value, and the rule is `idle_inhibit`.
windowrule = match:class ^(digital-frame)$, fullscreen true
windowrule = match:class ^(digital-frame)$, idle_inhibit always

# Hide the mouse cursor after 3s of inactivity for a clean frame.
cursor {
    inactive_timeout = 3
}

# Export the Wayland session env into the systemd --user manager so the kiosk
# and watcher services can reach the compositor, then bring the frame up.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP PATH && systemctl --user start digital-frame.target
