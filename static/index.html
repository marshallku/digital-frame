<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#000000" />
        <title>Digital Frame</title>
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <main id="stage" aria-label="Digital photo frame">
            <div class="layer" data-slot="0"></div>
            <div class="layer" data-slot="1"></div>
        </main>

        <div id="clock" class="overlay-clock"></div>
        <div id="progress" class="overlay-progress"><span></span></div>

        <div id="message" class="message" hidden></div>

        <div id="hint" class="hint">
            <kbd>Space</kbd> 일시정지 · <kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>F</kbd> 전체화면
        </div>

        <script src="/static/app.js" defer></script>
    </body>
</html>
